<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Family Recipes — Our Cookbook</title>
  <meta name="description" content="A warm shared cookbook for our family recipes — scale any recipe up or down, with Michelin-level pro tips." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23c0562f'/><text x='50' y='70' font-family='Georgia,serif' font-size='52' font-weight='700' fill='white' text-anchor='middle'>FR</text></svg>" />
  <!-- Critical: keep content hidden until unlocked, even before styles.css loads -->
  <style>body.locked #site{display:none!important}body.locked{overflow:hidden}#lockScreen{display:none}body.locked #lockScreen{display:flex}</style>
</head>
<body class="locked">
  <!-- ===================== Passcode lock screen ===================== -->
  <div id="lockScreen" class="lock-screen" role="dialog" aria-modal="true" aria-label="Enter passcode to continue">
    <div class="lock-card">
      <div class="lock-mark">FR</div>
      <h1>Family Recipes</h1>
      <p class="lock-sub">Enter the passcode to open the cookbook.</p>
      <form id="lockForm" autocomplete="off">
        <input id="lockInput" type="password" inputmode="numeric" pattern="[0-9]*"
               maxlength="12" placeholder="• • • •" aria-label="Passcode"
               autocomplete="off" />
        <button type="submit" class="btn btn-primary btn-block" id="lockBtn">Unlock</button>
      </form>
      <p id="lockError" class="lock-error" role="alert" hidden></p>
    </div>
    <div class="lock-foot">A private family cookbook 🔒</div>
  </div>

  <!-- ===================== Everything below is hidden until unlocked ===================== -->
  <div id="site" aria-hidden="true">
  <!-- ===================== Header ===================== -->
  <header class="site-header">
    <div class="wrap">
      <a class="brand" href="#/" data-link>
        <span class="mark" aria-hidden="true">FR</span>
        <span>Family Recipes</span>
      </a>
      <nav class="nav-btns">
        <a class="icon-btn" href="#/links" data-link title="Saved links" aria-label="Saved recipe links">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.07 0l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.07 0l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        </a>
        <button class="icon-btn" id="themeToggle" title="Toggle dark mode" aria-label="Toggle dark mode">
          <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        </button>
        <a class="btn btn-primary" href="#/add" data-link>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
          <span class="long">Add recipe</span>
        </a>
      </nav>
    </div>
  </header>

  <!-- ===================== App view (router renders here) ===================== -->
  <main id="app"></main>

  <!-- ===================== Footer ===================== -->
  <footer class="site-footer">
    <div class="wrap">
      <span>Family Recipes — made with love, scaled with math.</span>
      <span>Hosted on GitHub Pages · add recipes anytime</span>
    </div>
  </footer>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </div><!-- /#site -->

  <!-- Gate runs FIRST and only loads the rest of the app after a correct passcode -->
  <script src="gate.js"></script>
</body>
</html>
